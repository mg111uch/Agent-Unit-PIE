<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Interactive Graph Viewer</title>

<link rel="icon" href="data:,">

<style>
:root {
    --bg: #0f1117;
    --panel: #171923;
    --panel-border: #2a2f3a;
    --text: #e6eaf2;
    --muted: #9aa4b2;
    --accent: #4f8cff;

    --toolbar-height: 48px;
    --sidebar-width: 340px;
}

* {
    box-sizing: border-box;
}

html,
body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;

    background: var(--bg);
    color: var(--text);

    font-family:
        Inter,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        sans-serif;
}

#app {
    width: 100%;
    height: 100%;

    display: flex;
    flex-direction: column;
}

/* =======================================================
   Toolbar
======================================================= */

#toolbar {
    height: var(--toolbar-height);

    display: flex;
    align-items: center;
    gap: 10px;

    padding: 0 12px;

    background: var(--panel);

    border-bottom: 1px solid var(--panel-border);

    flex-shrink: 0;
}

.toolbar-group {
    display: flex;
    align-items: center;
    gap: 6px;
}

.toolbar-spacer {
    flex: 1;
}

button {
    background: #242938;
    color: var(--text);

    border: 1px solid #343c4f;
    border-radius: 6px;

    cursor: pointer;

    padding: 6px 10px;
}

button:hover {
    background: #2f374b;
}

input[type="text"] {
    width: 220px;

    padding: 6px 10px;

    border-radius: 6px;
    border: 1px solid #343c4f;

    background: #202634;
    color: var(--text);
}

/* =======================================================
   Main Area
======================================================= */

#main {
    flex: 1;

    display: flex;

    min-height: 0;
}

/* =======================================================
   Graph Container
======================================================= */

#graph-container {
    flex: 1;

    position: relative;
    overflow: hidden;
}

#graph-svg {
    width: 100%;
    height: 100%;

    display: block;
}

/* =======================================================
   Layers
======================================================= */

#cluster-layer,
#edge-layer,
#node-layer,
#overlay-layer {
    pointer-events: none;
}

#node-layer *,
#overlay-layer * {
    pointer-events: all;
}

/* =======================================================
   Sidebar
======================================================= */

#sidebar {
    width: var(--sidebar-width);

    background: var(--panel);

    border-left: 1px solid var(--panel-border);

    overflow-y: auto;

    flex-shrink: 0;
}

#sidebar-content {
    padding: 16px;
}

.sidebar-section {
    margin-bottom: 20px;
}

.sidebar-title {
    font-size: 14px;
    font-weight: 600;

    margin-bottom: 8px;
}

.metadata-row {
    margin-bottom: 6px;
    font-size: 13px;
}

.metadata-key {
    color: var(--muted);
}

/* =======================================================
   Status Bar
======================================================= */

#status-bar {
    height: 26px;

    display: flex;
    align-items: center;

    padding: 0 10px;

    background: var(--panel);

    border-top: 1px solid var(--panel-border);

    font-size: 12px;
    color: var(--muted);

    flex-shrink: 0;
}

/* =======================================================
   Loading Overlay
======================================================= */

#loading-overlay {
    position: absolute;

    inset: 0;

    display: flex;
    align-items: center;
    justify-content: center;

    background: rgba(15,17,23,0.85);

    z-index: 1000;
}

.hidden {
    display: none !important;
}
</style>
</head>

<body>

<div id="app">

    <!-- ===================================================
         Toolbar
    ==================================================== -->

    <div id="toolbar">

        <div class="toolbar-group">
            <button id="fit-btn">Fit</button>
            <button id="reset-btn">Reset</button>
        </div>

        <div class="toolbar-group">
            <button id="zoom-in-btn">+</button>
            <button id="zoom-out-btn">−</button>
        </div>

        <div class="toolbar-group">
            <input
                id="search-input"
                type="text"
                placeholder="Search nodes..."
            >
        </div>

        <div class="toolbar-spacer"></div>

        <div id="graph-summary">
            0 nodes · 0 edges
        </div>

    </div>

    <!-- ===================================================
         Main Content
    ==================================================== -->

    <div id="main">

        <!-- Graph Area -->

        <div id="graph-container">

            <svg id="graph-svg">

                <defs id="graph-defs"></defs>

                <g id="viewport">

                    <g id="cluster-layer"></g>

                    <g id="edge-layer"></g>

                    <g id="node-layer"></g>

                    <g id="overlay-layer"></g>

                </g>

            </svg>

            <div id="loading-overlay">
                Loading graph...
            </div>

        </div>

        <!-- Sidebar -->

        <aside id="sidebar">
            <div id="sidebar-content">

                <div class="sidebar-section">

                    <div class="sidebar-title">
                        Selection
                    </div>

                    <div id="selection-info">
                        No node selected
                    </div>

                </div>

                <div class="sidebar-section">

                    <div class="sidebar-title">
                        Metadata
                    </div>

                    <div id="metadata-panel"></div>

                </div>

                <div class="sidebar-section">

                    <div class="sidebar-title">
                        Connections
                    </div>

                    <div id="connections-panel"></div>

                </div>

            </div>
        </aside>

    </div>

    <!-- ===================================================
         Status Bar
    ==================================================== -->

    <div id="status-bar">
        Ready
    </div>

</div>

<!-- =======================================================
     Bootstrap Data
======================================================= -->

<script>
window.GRAPH_DATA = null;
window.GRAPH_CONFIG = {};
</script>

<!-- =======================================================
     Modules
======================================================= -->

<script type="module" src="graph_constants.js"></script>

<script type="module" src="graph_types.js"></script>
<script type="module" src="graph_state.js"></script>
<script type="module" src="graph_storage.js"></script>

<script type="module" src="graph_renderer.js"></script>
<script type="module" src="graph_nodes.js"></script>
<script type="module" src="graph_edges.js"></script>
<script type="module" src="graph_clusters.js"></script>

<script type="module" src="graph_viewport.js"></script>
<script type="module" src="graph_navigation.js"></script>

<script type="module" src="graph_drag.js"></script>
<script type="module" src="graph_selection.js"></script>

<script type="module" src="graph_events.js"></script>
<script type="module" src="graph_interaction.js"></script>

<script type="module" src="graph_search.js"></script>
<script type="module" src="graph_filters.js"></script>
<script type="module" src="graph_algorithms.js"></script>

<script type="module" src="graph_toolbar.js"></script>
<script type="module" src="graph_sidebar.js"></script>

<script type="module" src="graph_viewer.js"></script>

</body>
</html>
