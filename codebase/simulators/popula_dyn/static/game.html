<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agricultural Simulation Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 200px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-group label {
            font-size: 12px;
            font-weight: bold;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .control-row label {
            min-width: 80px;
            font-size: 11px;
        }

        input[type="range"] {
            width: 80px;
        }

        input[type="number"] {
            width: 60px;
            padding: 2px;
            border: 1px solid #555;
            border-radius: 3px;
            background: #333;
            color: #fff;
        }

        button {
            padding: 8px 12px;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        button:hover {
            background: #2980b9;
        }

        button:active {
            background: #21618c;
        }

        #stats {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            min-width: 250px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .stat-label {
            font-weight: bold;
        }

        .stat-value {
            color: #f39c12;
        }

        #grid-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid #34495e;
            background: #2c3e50;
        }

        .grid-cell {
            width: 8px;
            height: 8px;
            display: inline-block;
            border: 0.5px solid #34495e;
        }

        .land {
            background: #27ae60;
        }

        .farmer {
            background: #e74c3c;
            border-radius: 50%;
        }

        .healer {
            background: #9b59b6;
            border-radius: 50%;
        }

        .toolmaker {
            background: #f39c12;
            border-radius: 50%;
        }

        .trader {
            background: #1abc9c;
            border-radius: 50%;
        }

        #status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
        }

        .connection-status {
            color: #e74c3c;
        }

        .connection-status.connected {
            color: #27ae60;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="controls">
            <div class="control-group">
                <label>Simulation Control</label>
                <div class="control-row">
                    <button id="start-btn">Start</button>
                    <button id="stop-btn">Stop</button>
                    <button id="reset-btn">Reset</button>
                    <button id="step-btn">Step</button>
                </div>
            </div>

            <div class="control-group">
                <label>Population Parameters</label>
                <div class="control-row">
                    <label>Initial Pop:</label>
                    <input type="range" id="initial-pop" min="100" max="5000" value="2000" step="100">
                    <input type="number" id="initial-pop-val" min="100" max="5000" value="2000">
                </div>
                <div class="control-row">
                    <label>Birth Rate:</label>
                    <input type="range" id="birth-rate" min="0" max="0.2" value="0.04" step="0.01">
                    <input type="number" id="birth-rate-val" min="0" max="0.2" value="0.04" step="0.01">
                </div>
                <div class="control-row">
                    <label>Death Rate:</label>
                    <input type="range" id="death-rate" min="0" max="0.1" value="0.01" step="0.005">
                    <input type="number" id="death-rate-val" min="0" max="0.1" value="0.01" step="0.005">
                </div>
            </div>

            <div class="control-group">
                <label>Specialist Agents</label>
                <div class="control-row">
                    <label>Healers:</label>
                    <input type="range" id="healers" min="0" max="50" value="10" step="1">
                    <input type="number" id="healers-val" min="0" max="50" value="10">
                </div>
                <div class="control-row">
                    <label>Toolmakers:</label>
                    <input type="range" id="toolmakers" min="0" max="50" value="10" step="1">
                    <input type="number" id="toolmakers-val" min="0" max="50" value="10">
                </div>
                <div class="control-row">
                    <label>Traders:</label>
                    <input type="range" id="traders" min="0" max="50" value="10" step="1">
                    <input type="number" id="traders-val" min="0" max="50" value="10">
                </div>
            </div>

            <div class="control-group">
                <label>Grid Size</label>
                <div class="control-row">
                    <label>Width:</label>
                    <input type="range" id="grid-width" min="10" max="100" value="50" step="5">
                    <input type="number" id="grid-width-val" min="10" max="100" value="50">
                </div>
                <div class="control-row">
                    <label>Height:</label>
                    <input type="range" id="grid-height" min="10" max="100" value="50" step="5">
                    <input type="number" id="grid-height-val" min="10" max="100" value="50">
                </div>
            </div>
        </div>

        <div id="stats">
            <div class="stat-row">
                <span class="stat-label">Year:</span>
                <span class="stat-value" id="year">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Population:</span>
                <span class="stat-value" id="population">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Total Wealth:</span>
                <span class="stat-value" id="wealth">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Avg Skill:</span>
                <span class="stat-value" id="avg-skill">0.00</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Births:</span>
                <span class="stat-value" id="births">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Deaths:</span>
                <span class="stat-value" id="deaths">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Healers:</span>
                <span class="stat-value" id="healers-count">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Toolmakers:</span>
                <span class="stat-value" id="toolmakers-count">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Traders:</span>
                <span class="stat-value" id="traders-count">0</span>
            </div>
        </div>

        <div id="grid-container"></div>

        <div id="status">
            <span>Status: </span>
            <span id="connection-status" class="connection-status">Connecting...</span>
        </div>
    </div>

    <script>
        // Agricultural Simulation Game using PixiJS and WebSockets
        class SimulationGame {
            constructor() {
                this.gridWidth = 50;
                this.gridHeight = 50;
                this.cellSize = 8;
                this.websocket = null;
                this.isRunning = false;
                this.gridData = [];
                this.params = {
                    initial_pop: 2000,
                    birth_rate: 0.04,
                    death_rate: 0.01,
                    initial_healers: 10,
                    initial_toolmakers: 10,
                    initial_traders: 10,
                    grid_width: 50,
                    grid_height: 50
                };

                this.setupEventListeners();
                this.createGrid();
                this.connectWebSocket();
            }

            setupEventListeners() {
                // Control buttons
                document.getElementById('start-btn').addEventListener('click', () => {
                    this.sendMessage({type: 'start'});
                });

                document.getElementById('stop-btn').addEventListener('click', () => {
                    this.sendMessage({type: 'stop'});
                });

                document.getElementById('reset-btn').addEventListener('click', () => {
                    this.sendMessage({type: 'reset'});
                });

                document.getElementById('step-btn').addEventListener('click', () => {
                    this.sendMessage({type: 'step'});
                });

                // Parameter sliders and inputs
                this.setupParameterControls('initial-pop', 'initial_pop');
                this.setupParameterControls('birth-rate', 'birth_rate');
                this.setupParameterControls('death-rate', 'death_rate');
                this.setupParameterControls('healers', 'initial_healers');
                this.setupParameterControls('toolmakers', 'initial_toolmakers');
                this.setupParameterControls('traders', 'initial_traders');
                this.setupParameterControls('grid-width', 'grid_width');
                this.setupParameterControls('grid-height', 'grid_height');
            }

            setupParameterControls(sliderId, paramKey) {
                const slider = document.getElementById(sliderId);
                const input = document.getElementById(sliderId + '-val');

                slider.addEventListener('input', (e) => {
                    const value = parseFloat(e.target.value);
                    input.value = value;
                    this.params[paramKey] = value;
                    this.sendParameterUpdate();
                });

                input.addEventListener('input', (e) => {
                    const value = parseFloat(e.target.value);
                    slider.value = value;
                    this.params[paramKey] = value;
                    this.sendParameterUpdate();
                });
            }

            sendParameterUpdate() {
                this.sendMessage({type: 'update_params', params: this.params});
            }

            createGrid() {
                const container = document.getElementById('grid-container');
                container.innerHTML = '';

                for (let y = 0; y < this.gridHeight; y++) {
                    for (let x = 0; x < this.gridWidth; x++) {
                        const cell = document.createElement('div');
                        cell.className = 'grid-cell land';
                        cell.dataset.x = x;
                        cell.dataset.y = y;
                        container.appendChild(cell);
                    }
                }

                // Update container size
                container.style.width = (this.gridWidth * this.cellSize) + 'px';
                container.style.height = (this.gridHeight * this.cellSize) + 'px';
            }

            connectWebSocket() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/ws/simulation`;

                this.websocket = new WebSocket(wsUrl);

                this.websocket.onopen = (event) => {
                    console.log('WebSocket connected');
                    document.getElementById('connection-status').textContent = 'Connected';
                    document.getElementById('connection-status').classList.add('connected');
                };

                this.websocket.onmessage = (event) => {
                    const message = JSON.parse(event.data);
                    this.handleMessage(message);
                };

                this.websocket.onclose = (event) => {
                    console.log('WebSocket disconnected');
                    document.getElementById('connection-status').textContent = 'Disconnected';
                    document.getElementById('connection-status').classList.remove('connected');

                    // Attempt to reconnect after 3 seconds
                    setTimeout(() => this.connectWebSocket(), 3000);
                };

                this.websocket.onerror = (error) => {
                    console.error('WebSocket error:', error);
                };
            }

            sendMessage(message) {
                if (this.websocket && this.websocket.readyState === WebSocket.OPEN) {
                    this.websocket.send(JSON.stringify(message));
                }
            }

            handleMessage(message) {
                if (message.type === 'state' || message.type === 'update') {
                    this.updateStats(message.data);
                    this.updateGrid(message.data);
                }
            }

            updateStats(data) {
                document.getElementById('year').textContent = data.year;
                document.getElementById('population').textContent = data.population;
                document.getElementById('wealth').textContent = Math.round(data.wealth);
                document.getElementById('avg-skill').textContent = data.avg_skill.toFixed(2);
                document.getElementById('births').textContent = data.births;
                document.getElementById('deaths').textContent = data.deaths;
                document.getElementById('healers-count').textContent = data.healers;
                document.getElementById('toolmakers-count').textContent = data.toolmakers;
                document.getElementById('traders-count').textContent = data.traders;
            }

            updateGrid(data) {
                // Update grid size if changed
                if (data.grid_width !== this.gridWidth || data.grid_height !== this.gridHeight) {
                    this.gridWidth = data.grid_width;
                    this.gridHeight = data.grid_height;
                    this.createGrid();
                }

                // Clear all agent cells
                const cells = document.querySelectorAll('.grid-cell');
                cells.forEach(cell => {
                    cell.className = 'grid-cell land';
                });

                // Place agents on grid
                if (data.agent_positions) {
                    data.agent_positions.forEach(agent => {
                        const cell = document.querySelector(`.grid-cell[data-x="${agent.x}"][data-y="${agent.y}"]`);
                        if (cell) {
                            cell.classList.add(agent.type);
                        }
                    });
                }
            }
        }

        // Initialize game when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new SimulationGame();
        });
    </script>
</body>
</html>
